    - /federation
  footer_or_utility:
    - /privacy
    - /safety-policy
    - /status
    - /canary
    - /about
best_practices:
  - Inventory every route with structured metadata before redrawing navigation.
  - Organize around user needs and task flows, not internal system boundaries or org structure.
  - Keep top-level navigation focused on the smallest set of primary user tasks and audience needs.
  - Distinguish global, local, and contextual navigation instead of forcing every destination into one primary nav tier.
  - Identify duplicates and near-duplicates before redesign; merge or demote supporting essays rather than adding more top-level choices.
  - Use consistent labeling and controlled vocabulary so similar concepts are not split across multiple names.
  - Preserve the difference between discoverability and findability; navigation and search complement each other.
  - Validate the proposed hierarchy with tree testing or similar task-based navigation checks before final visual polish.
  - Treat IA as an ongoing governance function; refresh the inventory as the site changes.
