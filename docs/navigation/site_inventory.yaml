purpose: >
  LLM-parsable content inventory and IA audit baseline for redrawing CIRIS
  navigation paths around user personas, task stages, and evidence ladders.
approach_names:
  primary:
    - content inventory
    - content audit
    - information architecture audit
  adjacent:
    - navigation redesign
    - IA restructuring
    - tree-testing preparation
    - persona-based journey mapping
