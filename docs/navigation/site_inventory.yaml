site_wide_findings:
  - The strongest narrative overlap is across /, /compare, /how-it-works, and /first-contact. These pages all try to answer "why CIRIS" for nearby personas.
  - The strongest evidence ladder is /research-status -> /ciris-scoring -> /explore-a-trace. These work better as one grouped proof surface than as disconnected destinations.
  - The strongest utility cluster is /status, /canary, and /safety-policy. These should live in footer or utility nav, not primary marketing nav.
  - The long-form Accord/docs system should remain the canonical source of truth, with marketing pages summarizing and routing into it rather than restating it at full length.
  - /services and /install both serve activation intent. They should either be merged into one clearer "Get CIRIS" path or split cleanly into hosted-use versus local install.
  - /models and /federation read more like supporting essays than primary destinations and are candidates for merge or demotion.
  - /trust currently mixes trust architecture with commercial packaging; that weakens its information scent.
  - /about is credibility support rather than a high-priority discovery page.
proposed_navigation_clusters:
  primary_candidates:
